name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Flutter repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR Reviewer tool
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pr-reviewer
          token: ${{ secrets.REVIEWER_REPO_TOKEN }}
          path: pr-reviewer

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pr-reviewer/requirements.txt

      - name: Install dependencies
        run: pip install -r pr-reviewer/requirements.txt

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPO: ${{ github.repository }}
          REGISTRY_PATH: pr-reviewer/registry
        run: |
          cd pr-reviewer
          python -m reviewer.main review \
            --pr-number $PR_NUMBER \
            --repo $GITHUB_REPO \
            --branch "$BRANCH_NAME" \
            --base-sha $BASE_SHA \
            --head-sha $HEAD_SHA \
            --registry-path $REGISTRY_PATH
