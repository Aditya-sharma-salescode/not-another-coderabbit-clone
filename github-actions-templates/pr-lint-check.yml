name: PR Lint Check

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'

jobs:
  lint:
    name: Flutter Lint & Format
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'
          cache: true

      - name: Get changed Dart files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }}...${{ github.sha }} | grep '\.dart$' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Run flutter analyze
        if: steps.changed.outputs.has_files == 'true'
        id: analyze
        continue-on-error: true
        run: |
          flutter pub get
          flutter analyze ${{ steps.changed.outputs.files }} 2>&1 | tee /tmp/analyze_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run dart format check
        if: steps.changed.outputs.has_files == 'true'
        id: format
        continue-on-error: true
        run: |
          dart format --set-exit-if-changed --output=none ${{ steps.changed.outputs.files }} 2>&1 | tee /tmp/format_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post results as PR comment
        if: steps.changed.outputs.has_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let analyzeOutput = '';
            let formatOutput = '';
            try { analyzeOutput = fs.readFileSync('/tmp/analyze_output.txt', 'utf8'); } catch {}
            try { formatOutput = fs.readFileSync('/tmp/format_output.txt', 'utf8'); } catch {}

            const analyzeOk = '${{ steps.analyze.outputs.exit_code }}' === '0';
            const formatOk = '${{ steps.format.outputs.exit_code }}' === '0';
            const allOk = analyzeOk && formatOk;

            let body = '## Lint Check Results\n\n';
            body += allOk ? '✅ All checks passed!\n' : '❌ Issues found:\n';

            if (!analyzeOk) {
              body += '\n### Flutter Analyze\n```\n' + analyzeOutput.slice(0, 3000) + '\n```\n';
            }

            if (!formatOk) {
              body += '\n### Dart Format\n```\n' + formatOutput.slice(0, 3000) + '\n```\n';
              body += '\nRun `dart format .` to fix formatting issues.\n';
            }

            // Find and update existing comment
            const marker = '## Lint Check Results';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if issues found
        if: steps.changed.outputs.has_files == 'true'
        run: |
          if [ "${{ steps.analyze.outputs.exit_code }}" != "0" ] || [ "${{ steps.format.outputs.exit_code }}" != "0" ]; then
            echo "❌ Lint or format issues found"
            exit 1
          fi
